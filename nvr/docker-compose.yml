services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.0
    container_name: frigate
    ports:
      - "8971:8971"
      - "8554:8554"
      - "1984:1984"
      - "8556:8555/tcp"
      - "8556:8555/udp"
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${VOLUMES_PATH}/frigate/config:/config
      - ${MEDIA_HDD_PATH}/frigate/storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    restart: unless-stopped
    stop_grace_period: 30s
    shm_size: "512mb"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    privileged: true
    network_mode: host
